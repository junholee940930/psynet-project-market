<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: #07070f;
  color: #e2e8f0;
  height: 100vh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  padding: 16px 18px 12px;
  background: linear-gradient(to bottom, #07070f 65%, transparent);
  pointer-events: none;
}
header > * { pointer-events: auto; }
h1 { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 10px; letter-spacing: -0.3px; }
.legend { display: flex; flex-wrap: wrap; gap: 5px; }
.leg {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600;
  padding: 4px 11px; border-radius: 20px;
  cursor: pointer; border: 1.5px solid transparent;
  color: rgba(255,255,255,0.55);
  background: rgba(255,255,255,0.05);
  transition: all 0.15s;
}
.leg.active { color: #fff; border-color: var(--c); background: rgba(255,255,255,0.1); }
.leg-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--c); flex-shrink: 0; }
#map { width: 100vw; height: 100vh; cursor: grab; touch-action: none; }
#map:active { cursor: grabbing; }
svg { display: block; overflow: visible; }
.hex { cursor: pointer; }
.hex polygon { transition: filter 0.15s; }
.hex:hover polygon { filter: brightness(1.4); }
.hex text { pointer-events: none; }
/* Modal */
.mbg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 200;
  align-items: flex-end; justify-content: center;
}
.mbg.open { display: flex; }
.modal {
  background: #0f172a; width: 100%; max-height: 75vh; overflow-y: auto;
  border-radius: 16px 16px 0 0;
  border: 1px solid rgba(255,255,255,0.08); border-bottom: none;
}
.mh {
  padding: 18px 18px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  position: sticky; top: 0; background: #0f172a;
}
.mcat { font-size: 11px; font-weight: 700; margin-bottom: 5px; }
.mtitle { font-size: 16px; font-weight: 800; line-height: 1.35; word-break: keep-all; padding-right: 36px; }
.mx {
  position: absolute; top: 14px; right: 14px;
  background: rgba(255,255,255,0.08); border: none; color: #aaa;
  width: 28px; height: 28px; border-radius: 50%; font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.mx:hover { color: #fff; background: rgba(255,255,255,0.15); }
.mb { padding: 16px 18px 28px; }
.mrow {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 13px;
}
.mrow:last-of-type { border-bottom: none; }
.mrlabel { font-size: 11px; color: rgba(255,255,255,0.4); }
.mrval { font-weight: 600; }
.mbadge {
  font-size: 11px; font-weight: 700; padding: 2px 10px;
  border-radius: 20px; background: rgba(255,255,255,0.1);
}
.hbar { display: flex; align-items: center; gap: 8px; }
.hbg { width: 80px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
.hfill { height: 100%; border-radius: 2px; }
.abtn {
  display: block; width: 100%; margin-top: 14px;
  padding: 13px; border-radius: 8px;
  font-size: 14px; font-weight: 700;
  text-align: center; text-decoration: none;
  color: #fff;
}
@media (min-width: 640px) {
  h1 { font-size: 17px; }
  .mbg { align-items: center; }
  .modal { width: 460px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); max-height: 80vh; }
}
</style>

// Assign categories + heat
PROJECTS.forEach(p => {
  p.cat = cat(p.name);
  p.heat = (STATUS_W[p.status] || 1) * 2 + p.mc;
});

// Sort: by category cluster order, then heat desc within category
const CAT_ORDER = ['ai','content','data','dev','ops'];
PROJECTS.sort((a,b) => {
  const ca = CAT_ORDER.indexOf(a.cat), cb = CAT_ORDER.indexOf(b.cat);
  if (ca !== cb) return ca - cb;
  return b.heat - a.heat;
});

// Hex spiral positions (axial coords, pointy-top)
function hexSpiral(n) {
  const dirs = [[1,0],[0,1],[-1,1],[-1,0],[0,-1],[1,-1]];
  const coords = [[0,0]];
  for (let ring = 1; coords.length < n; ring++) {
    let q = ring, r = -ring;
    for (let s = 0; s < 6 && coords.length < n; s++) {
      for (let step = 0; step < ring && coords.length < n; step++) {
        coords.push([q, r]);
        q += dirs[s][0]; r += dirs[s][1];
      }
    }
  }
  return coords;
}

function axialToXY(q, r, sz) {
  return [
    sz * Math.sqrt(3) * (q + r / 2),
    sz * 1.5 * r
  ];
}

function hexPoints(cx, cy, sz) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 180 * (60 * i - 30);
    pts.push((cx + sz * Math.cos(a)).toFixed(2) + ',' + (cy + sz * Math.sin(a)).toFixed(2));
  }
  return pts.join(' ');
}

// Build SVG
const HEX_SIZE = 42;
const GAP = 2;
const EFFECTIVE = HEX_SIZE - GAP / 2;

const coords = hexSpiral(PROJECTS.length);
const svg = document.getElementById('svg');
const W = window.innerWidth, H = window.innerHeight;

svg.setAttribute('width', W);
svg.setAttribute('height', H);

// Pan/zoom state
let tx = W / 2, ty = H / 2, scale = 1;
let dragging = false, lastX, lastY;

const g = document.createElementNS('http://www.w3.org/2000/svg','g');
svg.appendChild(g);

function render() {
  g.setAttribute('transform', `translate(${tx},${ty}) scale(${scale})`);
}

// Draw hexes
PROJECTS.forEach((p, i) => {
  const [q, r] = coords[i];
  const [cx, cy] = axialToXY(q, r, HEX_SIZE);
  const c = CATS[p.cat].color;
  const alpha = 0.25 + (p.heat / 17) * 0.65; // 0.25–0.90
  const innerSz = EFFECTIVE * (0.72 + (p.mc / 8) * 0.22);

  const el = document.createElementNS('http://www.w3.org/2000/svg','g');
  el.setAttribute('class','hex');
  el.setAttribute('data-i', i);

  // Outer hex (dim border)
  const outer = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  outer.setAttribute('points', hexPoints(cx, cy, EFFECTIVE));
  outer.setAttribute('fill', `${c}22`);
  outer.setAttribute('stroke', `${c}55`);
  outer.setAttribute('stroke-width', '0.8');

  // Inner filled hex (heat indicator)
  const inner = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  inner.setAttribute('points', hexPoints(cx, cy, innerSz));
  const r255 = parseInt(c.slice(1,3),16), g255 = parseInt(c.slice(3,5),16), b255 = parseInt(c.slice(5,7),16);
  inner.setAttribute('fill', `rgba(${r255},${g255},${b255},${alpha.toFixed(2)})`);
  inner.setAttribute('stroke', c);
  inner.setAttribute('stroke-width', '0.5');

  // Season indicator dot (S2 = small dot)
  if (p.s === 2) {
    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx', cx + innerSz * 0.5);
    dot.setAttribute('cy', cy - innerSz * 0.6);
    dot.setAttribute('r', '3');
    dot.setAttribute('fill', '#fff');
    dot.setAttribute('opacity', '0.5');
    el.appendChild(dot);
  }

  // Label (short name, fits in hex)
  const maxChars = 7;
  const short = p.name.length > maxChars ? p.name.slice(0, maxChars) + '…' : p.name;
  const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
  txt.setAttribute('x', cx);
  txt.setAttribute('y', cy);
  txt.setAttribute('text-anchor','middle');
  txt.setAttribute('dominant-baseline','middle');
  txt.setAttribute('font-size', '6.5');
  txt.setAttribute('font-family', "'Apple SD Gothic Neo','Malgun Gothic',sans-serif");
  txt.setAttribute('fill', alpha > 0.5 ? '#fff' : 'rgba(255,255,255,0.7)');
  txt.setAttribute('font-weight', p.heat > 10 ? '700' : '500');
  txt.textContent = short;

  el.appendChild(outer);
  el.appendChild(inner);
  el.appendChild(txt);
  el.addEventListener('click', () => openModal(p));
  g.appendChild(el);
});

render();

// Pan & zoom — mouse
svg.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
svg.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx += e.clientX - lastX; ty += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  render();
});
svg.addEventListener('mouseup', () => { dragging = false; });
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const mx = e.clientX, my = e.clientY;
  tx = mx + (tx - mx) * delta;
  ty = my + (ty - my) * delta;
  scale = Math.max(0.3, Math.min(4, scale * delta));
  render();
}, { passive: false });

// Pan & zoom — touch
let touches = {};
svg.addEventListener('touchstart', e => {
  [...e.changedTouches].forEach(t => touches[t.identifier] = { x: t.clientX, y: t.clientY });
});
svg.addEventListener('touchmove', e => {
  e.preventDefault();
  const ids = Object.keys(touches);
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const prev = touches[t.identifier];
    if (prev) { tx += t.clientX - prev.x; ty += t.clientY - prev.y; render(); }
    touches[t.identifier] = { x: t.clientX, y: t.clientY };
  } else if (e.touches.length === 2) {
    const [a, b] = [e.touches[0], e.touches[1]];
    const pa = touches[a.identifier] || { x: a.clientX, y: a.clientY };
    const pb = touches[b.identifier] || { x: b.clientX, y: b.clientY };
    const prevDist = Math.hypot(pa.x - pb.x, pa.y - pb.y);
    const curDist = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    if (prevDist > 0) {
      const delta = curDist / prevDist;
      const mx = (a.clientX + b.clientX) / 2, my = (a.clientY + b.clientY) / 2;
      tx = mx + (tx - mx) * delta; ty = my + (ty - my) * delta;
      scale = Math.max(0.3, Math.min(4, scale * delta));
      render();
    }
    touches[a.identifier] = { x: a.clientX, y: a.clientY };
    touches[b.identifier] = { x: b.clientX, y: b.clientY };
  }
}, { passive: false });
svg.addEventListener('touchend', e => {
  [...e.changedTouches].forEach(t => delete touches[t.identifier]);
});

// Category filter
const activeCats = new Set(Object.keys(CATS));
const legEl = document.getElementById('leg');
Object.entries(CATS).forEach(([key, val]) => {
  const btn = document.createElement('div');
  btn.className = 'leg active';
  btn.style.setProperty('--c', val.color);
  btn.innerHTML = `<span class="leg-dot"></span>${val.label}`;
  btn.addEventListener('click', () => {
    if (activeCats.has(key)) { activeCats.delete(key); btn.classList.remove('active'); }
    else { activeCats.add(key); btn.classList.add('active'); }
    document.querySelectorAll('.hex').forEach(el => {
      const p = PROJECTS[+el.dataset.i];
      el.style.opacity = activeCats.has(p.cat) ? '1' : '0.08';
    });
  });
  legEl.appendChild(btn);
});

    </div>
    <a class="abtn" href="${gmail}" target="_blank" rel="noopener" style="background:${c.color};color:#000">참여 신청하기</a>
  `;
  document.getElementById('mbg').classList.add('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeM(); });
