<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사이넷 프로젝트 마켓</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #fff; color: #111; -webkit-text-size-adjust: 100%; }
  header { padding: 28px 16px 18px; border-bottom: 2px solid #111; }
  h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
  .contact { font-size: 14px; color: #444; }
  .contact a { color: #111; text-decoration: underline; text-underline-offset: 2px; }
  .tabs { display: flex; padding: 0 16px; border-bottom: 1px solid #ddd; }
  .tab { padding: 14px 18px; font-size: 14px; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -1px; color: #888; }
  .tab.active { color: #111; border-bottom-color: #111; }
  .content { padding: 0 0 60px; }
  .season-panel { display: none; }
  .season-panel.active { display: block; }
  .count-info { padding: 14px 16px 10px; font-size: 12px; color: #888; }
  .badge { display: inline-block; font-size: 12px; font-weight: 600; color: #555; white-space: nowrap; }
  .members { display: flex; flex-wrap: wrap; gap: 4px; }
  .member-chip { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; padding: 3px 7px; border-radius: 20px; border: 1px solid #e0e0e0; background: #fafafa; white-space: nowrap; }
  .member-chip.pm { background: #111; color: #fff; border-color: #111; }
  .member-share { font-size: 10px; opacity: 0.7; }
  .action-btn { background: none; border: 1px solid #111; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 2px; font-family: inherit; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
  .action-btn:active { background: #111; color: #fff; }
  .action-btn.eval { border-color: #555; color: #555; }
  .action-btn.eval:active { background: #555; color: #fff; }
  .action-none { color: #ccc; font-size: 13px; }

  /* Mobile card layout (default) */
  table { display: none; }
  .card-list { padding: 0 16px; }
  .card { border: 1px solid #eee; border-radius: 6px; padding: 16px; margin-bottom: 12px; background: #fff; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
  .card-num { font-size: 11px; color: #aaa; font-weight: 500; flex-shrink: 0; padding-top: 2px; }
  .card-name { font-size: 15px; font-weight: 700; word-break: keep-all; flex: 1; line-height: 1.4; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 10px; font-size: 12px; color: #666; }
  .card-pm { }
  .card-members { margin-bottom: 10px; }
  .card-bottom { display: flex; align-items: center; justify-content: space-between; gap: 8px; }

  /* Desktop table layout */
  @media (min-width: 768px) {
    header { padding: 48px 40px 24px; }
    h1 { font-size: 28px; }
    .tabs { padding: 0 40px; }
    .tab { padding: 16px 24px; }
    .content { padding: 0 0 60px; }
    .count-info { padding: 16px 40px 12px; }
    table { display: table; width: 100%; border-collapse: collapse; font-size: 13px; }
    .card-list { display: none; }
    thead tr { border-bottom: 2px solid #111; }
    th { padding: 12px 10px; text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; color: #555; white-space: nowrap; }
    th:first-child { width: 36px; padding-left: 40px; }
    tbody tr { border-bottom: 1px solid #eee; }
    tbody tr:hover { background: #f9f9f9; }
    td { padding: 13px 10px; line-height: 1.5; vertical-align: middle; }
    td:first-child { font-size: 11px; color: #aaa; font-weight: 500; padding-left: 40px; }
    td:last-child { padding-right: 40px; }
    .project-name { font-weight: 600; word-break: keep-all; }
    .action-btn:hover { background: #111; color: #fff; }
    .action-btn.eval:hover { background: #555; color: #fff; }
    .members { min-width: 80px; }
  }

  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; width: 100%; max-height: 90vh; overflow-y: auto; border-radius: 12px 12px 0 0; box-shadow: 0 -4px 32px rgba(0,0,0,0.18); }
  .modal-header { padding: 20px 20px 14px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; z-index: 1; }
  .modal-title { font-size: 16px; font-weight: 800; margin-bottom: 4px; padding-right: 32px; word-break: keep-all; }
  .modal-meta { font-size: 12px; color: #888; }
  .modal-close { position: absolute; top: 18px; right: 20px; font-size: 22px; cursor: pointer; color: #aaa; border: none; background: none; font-family: inherit; line-height: 1; padding: 4px; }
  .modal-body { padding: 18px 20px 32px; }
  .eval-section { margin-bottom: 20px; }
  .eval-section:last-child { margin-bottom: 0; }
  .eval-section-title { font-size: 12px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #eee; }
  .score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .score-label { font-size: 11px; color: #999; width: 36px; flex-shrink: 0; }
  .score-bar-wrap { flex: 1; display: flex; align-items: center; gap: 8px; }
  .score-bar-bg { flex: 1; height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 3px; background: #111; }
  .score-val { font-size: 13px; font-weight: 700; width: 28px; text-align: right; flex-shrink: 0; }
  .eval-comment { font-size: 12px; color: #555; line-height: 1.6; margin-top: 8px; padding: 10px 12px; background: #f8f8f8; border-radius: 3px; }

  @media (min-width: 768px) {
    .modal-bg { align-items: center; }
    .modal { width: 560px; max-width: 95vw; max-height: 85vh; border-radius: 4px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
    .modal-header { padding: 24px 28px 16px; }
    .modal-title { font-size: 17px; padding-right: 40px; }
    .modal-close { top: 20px; right: 24px; }
    .modal-body { padding: 20px 28px 28px; }
  }

  /* Apply modal */
  .apply-box { text-align: center; padding: 20px 0 8px; }
  .apply-box p { font-size: 14px; color: #444; margin-bottom: 20px; line-height: 1.7; }
  .apply-email-wrap { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .apply-email { display: inline-block; padding: 12px 28px; background: #111; color: #fff; font-size: 14px; font-weight: 600; border-radius: 3px; text-decoration: none; width: 100%; max-width: 280px; text-align: center; }
  .apply-email:hover { background: #333; }
  .apply-email.gmail { background: #fff; color: #111; border: 1px solid #ddd; }
  .apply-email.gmail:hover { background: #f5f5f5; }
</style>

function memberChips(members, showShare) {
  const nonPM = (members || []).filter(m => m.role !== 'PM');
  if (!nonPM.length) return '-';
  return '<div class="members">' + nonPM.map(m => {
    const shareText = showShare && m.share && m.share !== '0%' && m.share !== '0.00%' ? ` <span class="member-share">${m.share}</span>` : '';
    return `<span class="member-chip">${m.name}${shareText}</span>`;
  }).join('') + '</div>';
}

function pmCell(pmName, members) {
  const pmData = (members || []).find(m => m.role === 'PM');
  const share = pmData && pmData.share && pmData.share !== '0%' && pmData.share !== '0.00%'
    ? ` <span class="member-share" style="font-size:11px;opacity:0.6;">${pmData.share}</span>` : '';
  return `${pmName}${share}`;
}

function openEval(key, name) {
  const d = evalData[key];
  if (!d) return;
  document.getElementById('modalTitle').textContent = name;
  document.getElementById('modalMeta').textContent = 'PM: ' + d.pm + ' · 평가자: 임원';
  const cats = ['매출성과','가속성과','AI성과'];
  let html = '';
  cats.forEach(cat => {
    const s = d.scores[cat];
    html += `<div class="eval-section">
      <div class="eval-section-title">${cat}</div>
      <div class="score-row">
        <span class="score-label">팩트</span>
        <div class="score-bar-wrap"><div class="score-bar-bg"><div class="score-bar-fill" style="width:${s.fact}%"></div></div></div>
        <span class="score-val">${s.fact}</span>
      </div>
      <div class="score-row">
        <span class="score-label">보정</span>
        <div class="score-bar-wrap"><div class="score-bar-bg"><div class="score-bar-fill" style="width:${s.adj}%"></div></div></div>
        <span class="score-val">${s.adj}</span>
      </div>
      <div class="eval-comment">${s.comment}</div>
    </div>`;
  });
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalBg').classList.add('open');
}

function openApply(name) {
  document.getElementById('modalTitle').textContent = name;
  document.getElementById('modalMeta').textContent = '참여 신청';
  const email = 'junholee940930@psynet.co.kr';
  const subject = encodeURIComponent('[참여신청] ' + name);
  const gmail = 'https://mail.google.com/mail/?view=cm&to=' + email + '&su=' + subject;
  const body = document.getElementById('modalBody');
  body.innerHTML = `<div class="apply-box">
    <p>해당 프로젝트에 참여하려면<br>아래 이메일로 문의해 주세요.</p>
    <div class="apply-email-wrap">
      <a class="apply-email" href="${gmail}" target="_blank" rel="noopener">${email}</a>
    </div>
  </div>`;
  document.getElementById('modalBg').classList.add('open');
}

function closeModal(e) { if (e.target === document.getElementById('modalBg')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalBg').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

function renderS1() {
  const tbody = document.getElementById('s1-body');
  const cardList = document.getElementById('s1-cards');
  let tableHtml = '';
  let cardHtml = '';
  s1Data.forEach((p, i) => {
    const members = collabS1[p.key] || [];
    const chips = memberChips(members, true);
    const pm = pmCell(p.pm, members);
    const hasEval = !!evalData[p.key];
    const evalBtn = hasEval
      ? `<button class="action-btn eval" onclick="openEval('${p.key}','${p.name.replace(/'/g,"\\'")}')">평가보기</button>`
      : `<span class="action-none">-</span>`;
    tableHtml += `<tr>
      <td>${i+1}</td>
      <td class="project-name">${p.name}</td>
      <td>${pm}</td>
      <td>${chips}</td>
      <td><span class="badge">${p.status}</span></td>
      <td>${evalBtn}</td>
    </tr>`;
    cardHtml += `<div class="card">
      <div class="card-top">
        <span class="card-num">${i+1}</span>
        <span class="card-name">${p.name}</span>
        <span class="badge">${p.status}</span>
      </div>
      <div class="card-meta"><span class="card-pm">PM · ${pm}</span></div>
      ${memberChips(members, true) !== '-' ? `<div class="card-members">${chips}</div>` : ''}
      <div class="card-bottom">${evalBtn}</div>
    </div>`;
  });
  tbody.innerHTML = tableHtml;
  cardList.innerHTML = cardHtml;
}

    cardHtml += `<div class="card">
      <div class="card-top">

        <span class="badge">${p.status}</span>

function switchTab(season, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.season-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(season).classList.add('active');
}

renderS1(); renderS2();
</script>
